name: CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd /opt/discord-bot
            git fetch origin
            git checkout main
            git reset --hard origin/main
            /opt/discord-bot/venv/bin/python -m pip install -r requirements.txt
            sudo -n /usr/bin/systemctl restart discord-bot
            sudo -n /usr/bin/systemctl status discord-bot --no-pager
